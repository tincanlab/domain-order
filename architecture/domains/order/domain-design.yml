  generated_at: "2026-03-22T20:26:20.8879949Z"

bounded_context:
  name: "Order"
  description: "BOPIS order lifecycle management from order placement through pickup completion, including order status, cancellation, and pickup readiness."
  ubiquitous_language:
    - term: "BOPIS order"
      definition: "A customer order placed online for pickup in a store."
    - term: "pickup ready"
      definition: "The order has been fulfilled and is ready for store pickup."
    - term: "pickup completion"
      definition: "The customer has collected the order and the order is finalized."
    - term: "reservation"
      definition: "The inventory hold created before the order is confirmed."
  anti_corruption_layers:
    - external_domain: "Ecommerce"
      strategy: "translator"
      interface_id: "ifc-product-catalog-api"
    - external_domain: "Inventory"
      strategy: "adapter"
      interface_id: "ifc-inventory-management-api"
    - external_domain: "Notification"
      strategy: "facade"
      interface_id: "ifc-notification-api"
    - external_domain: "Party Role Management"
      strategy: "adapter"
      interface_id: "ifc-pickup-event"

aggregates:
  - id: "ord-order"
    name: "Order"
    description: "Primary aggregate for BOPIS order lifecycle and status transitions."
    root_entity: true
    entities:
      - id: "ord-order-entity"
        name: "Order"
        fields:
          - name: "order_id"
            type: "string"
            required: true
            constraints: "globally unique, immutable"
          - name: "customer_id"
            type: "string"
            required: true
            constraints: "required for customer lookup"
          - name: "store_id"
            type: "string"
            required: true
            constraints: "must reference pickup store"
          - name: "status"
            type: "string"
            required: true
            constraints: "one of RECEIVED, RESERVED, CONFIRMED, READY_FOR_PICKUP, PICKED_UP, CANCELLED"
          - name: "created_at"
            type: "timestamp"
            required: true
            constraints: "UTC"
          - name: "updated_at"
            type: "timestamp"
            required: true
            constraints: "UTC"
        indexes:
          - "customer_id"
          - "store_id"
          - "status"
    value_objects:
      - name: "OrderId"
        fields:
          - name: "value"
            type: "string"
      - name: "PickupWindow"
        fields:
          - name: "start_at"
            type: "timestamp"
          - name: "end_at"
            type: "timestamp"
    domain_events:
      - id: "evt-order-placed"
        name: "OrderPlaced"
        trigger: "command"
        payload_fields:
          - "order_id"
          - "customer_id"
          - "store_id"
      - id: "evt-order-ready"
        name: "OrderReadyForPickup"
        trigger: "state transition"
        payload_fields:
          - "order_id"
          - "store_id"
      - id: "evt-order-picked-up"
        name: "OrderPickedUp"
        trigger: "state transition"
        payload_fields:
          - "order_id"
          - "picked_up_at"
      - id: "evt-order-cancelled"
        name: "OrderCancelled"
        trigger: "state transition"
        payload_fields:
          - "order_id"
          - "cancel_reason"
    storage:
      type: "relational"
      technology: "PostgreSQL"
      consistency: "strong"
      access_patterns:
        - "order lookup by id"
        - "customer order history"
        - "store queue / pickup tracking"
    sid_alignment:
      entity: "CustomerOrder"
      confidence: "local_knowledge"

workflows:
  - id: "wf-order-lifecycle"
    name: "Order lifecycle"
    type: "state_machine"
    description: "Lifecycle from order creation through pickup completion or cancellation."
    states:
      - name: "RECEIVED"
        type: "initial"
        transitions:
          - target: "RESERVED"
            trigger: "inventory reservation confirmed"
            guard: "inventory available"
            action: "persist reservation and create order"
            event_emitted: "evt-order-placed"
      - name: "RESERVED"
        type: "intermediate"
        transitions:
          - target: "CONFIRMED"
            trigger: "order accepted"
            guard: "payment / commerce acceptance complete"
            action: "confirm order"
            event_emitted: "evt-order-placed"
          - target: "CANCELLED"
            trigger: "customer cancel"
            guard: "order cancellable"
            action: "release reservation"
            event_emitted: "evt-order-cancelled"
      - name: "CONFIRMED"
        type: "intermediate"
        transitions:
          - target: "READY_FOR_PICKUP"
            trigger: "fulfillment complete"
            guard: "items picked and staged"
            action: "emit readiness"
            event_emitted: "evt-order-ready"
          - target: "CANCELLED"
            trigger: "store cancel"
            guard: "order not yet picked up"
            action: "release reservation and notify customer"
            event_emitted: "evt-order-cancelled"
      - name: "READY_FOR_PICKUP"
        type: "intermediate"
        transitions:
          - target: "PICKED_UP"
            trigger: "pickup verified"
            guard: "customer identity and QR validated"
            action: "close order"
            event_emitted: "evt-order-picked-up"
      - name: "PICKED_UP"
        type: "terminal"
        transitions: []
      - name: "CANCELLED"
        type: "terminal"
        transitions: []
    compensating_actions:
      - step: "cancel order"
        compensation: "release inventory reservation"
      - step: "pickup verification failure"
        compensation: "retain order in READY_FOR_PICKUP and alert associate"
    tmf_alignment:
      process: "Support Customer Order Management"
      confidence: "local_knowledge"


          error_codes: ["404", "500"]
          auth: "JWT"
          rate_limit: "300 rps"
        - method: "GET"
          path: "/api/v1/orders/customer/{customer_id}"
          description: "List customer orders."
          request_schema: "N/A"
          response_schema: "OrderListResponse"
          error_codes: ["404", "500"]

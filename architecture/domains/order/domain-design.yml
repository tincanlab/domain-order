    controls:
      - "encrypt data in transit and at rest"
      - "least privilege service access"
    notes: "No payment card storage in this domain."
  - standard: "GDPR"
    applicability: "Customer identity and order history processing."
    controls:
      - "data minimization"
      - "subject access support"
    notes: "Customer data should be retained only as required."
  - standard: "CCPA"
    applicability: "Customer order history and fulfillment records."
    controls:
      - "access disclosure"
      - "deletion workflow coordination"
    notes: "Deletion requests may require downstream coordination."

decisions:
  - id: "adr-001"
    title: "Order aggregate is the lifecycle system of record"
    status: "proposed"
    context: "BOPIS order state changes must remain consistent across fulfillment and customer notification consumers."
    decision: "Use a single order aggregate to own lifecycle transitions and publish status events."
    consequences: "Simplifies read/write consistency and clarifies cancellation semantics."
    sa_deviation: false
    sa_review_required: false
  - id: "adr-002"
    title: "Inventory reservation is a prerequisite for confirmation"
    status: "proposed"
    context: "Order confirmation depends on real-time store inventory availability."
    decision: "Treat inventory reservation as a gating step before order confirmation."
    consequences: "Failed reservations trigger immediate cancellation or retry handling."
    sa_deviation: false
    sa_review_required: false

sa_conformance:
  nfr_budget_fit: true
  interface_conformance:
